name: RELEASE_TO_SERVER

env:
  DOCKER_IMAGE: 1006lem/business-card
  DOCKER_CONTAINER: business-card

on:
  push:
    branches: [ develop ]

jobs:
  # Docker image build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code with Submodules
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
          fetch-depth: 0
          
      - name: Move Submodule to src/main/resources
        run: |
          cp -r business-card-config/* src/main/resources/
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        
      - name: login to Dockerhub
        uses: docker/login-action@v1
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Docker Build
        id: docker_build
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          
      - name: Docker push
        id: docker_push
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
     - name: create EC2 run script 
       run: |
        # Create the script content
        echo "#!/bin/bash" > script.sh
        echo "echo 'Logging into Docker...'" >> script.sh
        echo "docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}" >> script.sh
        
        echo "echo 'Pulling Docker image...'" >> script.sh
        echo "docker pull ${{ env.DOCKER_IMAGE }}:latest" >> script.sh
  
        echo "echo 'Running Docker container...'" >> script.sh
        echo "docker rm -f ${{ env.DOCKER_CONTAINER }} || true" >> script.sh
        echo "docker run -d -p 8080:8080 --name ${{ env.DOCKER_CONTAINER }} --restart always ${{ env.DOCKER_IMAGE }}:latest" >> script.sh

        echo "docker ps" >> script.sh  # Check running containers
        
     - name: EC2 ssh connection
       run: |
        echo "${{ secrets.AWS_PEM }}" >> $HOME/key.pem
        chmod 400 $HOME/key.pem
          
        # Copy script.sh to EC2 instance
        scp -i $HOME/key.pem -o StrictHostKeyChecking=no script.sh ec2-user@${{ secrets.EC2_HOST }}:~/script.sh
          
        # Execute the script on EC2
        ssh -i $HOME/key.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} 'bash ~/script.sh'

